<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考分数查询</title>
<style>
  :root {
    --primary: #c41e3a;
    --primary-dark: #a01830;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --border: #e0e0e0;
    --gold: #d4a017;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #fdf2f4 0%, #f0f4ff 30%, #fdf2f4 60%, #fff8f0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(196,30,58,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(212,160,23,0.05) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  /* ===== 查询页 ===== */
  .query-page { display: block; }
  .query-page.hidden { display: none; }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header .icon {
    font-size: 48px;
    margin-bottom: 8px;
    display: block;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 2px;
  }
  .header p {
    font-size: 14px;
    color: var(--text-light);
    margin-top: 6px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-group label .required {
    color: var(--primary);
    margin-left: 2px;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    height: 44px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    font-size: 15px;
    color: var(--text);
    background: #fafafa;
    transition: all 0.2s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(196,30,58,0.08);
  }
  .form-group input::placeholder { color: #bbb; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* 验证码 */
  .captcha-row {
    display: flex;
    gap: 12px;
  }
  .captcha-row input { flex: 1; }
  .captcha-box {
    width: 110px;
    height: 44px;
    background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #555;
    cursor: pointer;
    user-select: none;
    font-family: "Courier New", monospace;
    font-style: italic;
    position: relative;
  }
  .captcha-box::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
  }

  /* 按钮 */
  .btn {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 2px;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    margin-top: 8px;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(196,30,58,0.3);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== 结果页 ===== */
  .result-page {
    display: none;
    animation: slideIn 0.45s ease;
  }
  .result-page.show { display: block; }
  @keyframes slideIn {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .result-header-card {
    background: linear-gradient(135deg, #c41e3a, #8b1a2b);
    color: #fff;
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(196,30,58,0.25);
    margin-bottom: 20px;
  }
  .result-header-card .student-name {
    font-size: 15px;
    opacity: 0.85;
    margin-bottom: 4px;
  }
  .result-header-card .total-score-link {
    display: inline-block;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1;
    margin: 8px 0;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    border-bottom: 2px dashed rgba(255,255,255,0.4);
    transition: all 0.2s;
    cursor: pointer;
    padding: 8px 24px;
    border-radius: 8px;
  }
  .result-header-card .total-score-link:hover {
    color: #ffd700;
    border-bottom-color: #ffd700;
    border-bottom-style: solid;
    background: rgba(255,255,255,0.08);
  }
  .result-header-card .total-score-link .click-hint {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  /* 科目卡片 */
  .sub-score-hidden {
    font-size: 18px;
    font-weight: 600;
    color: #bbb;
    padding: 12px 0;
  }
  .sub-score-hidden .click-hint-sm {
    display: inline-block;
    padding: 4px 12px;
    border: 1.5px dashed #ccc;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .subject-card:hover .click-hint-sm {
    border-color: #999;
    color: #888;
  }
  .result-header-card .meta {
    font-size: 13px;
    opacity: 0.8;
  }

  /* 各科分数卡片 */
  .subjects-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .subject-card {
    background: #fff;
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid #f0f0f0;
    transition: transform 0.2s;
  }
  .subject-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .subject-card .sub-name {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .subject-card .sub-score {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
  }
  .subject-card .sub-full {
    font-size: 12px;
    color: #aaa;
  }

  /* 排名信息 */
  .info-card {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid #f0f0f0;
    margin-bottom: 20px;
  }
  .info-card .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .info-row + .info-row {
    border-top: 1px dashed #eee;
  }
  .info-row .label { font-size: 14px; color: var(--text-light); }
  .info-row .value { font-size: 15px; font-weight: 600; color: var(--text); }

  /* 返回按钮 */
  .btn-back {
    width: 100%;
    height: 46px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: #fff;
    font-size: 15px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .btn-back:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  /* Loading */
  .spinner {
    display: none;
    width: 22px; height: 22px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
  }

  .disclaimer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #bbb;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .form-row { grid-template-columns: 1fr; }
    .subjects-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .result-header-card .total-score { font-size: 50px; }
    .subject-card .sub-score { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- ==================== 查询页 ==================== -->
  <div class="query-page" id="queryPage">
    <div class="header">
      <span class="icon">🎓</span>
      <h1>高考分数查询</h1>
      <p>全国普通高等学校招生统一考试成绩查询</p>
    </div>

    <div class="card">
      <form id="queryForm" autocomplete="off">
        <div class="form-group">
          <label>考生姓名 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="请输入考生姓名" maxlength="20" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>省份/直辖市 <span class="required">*</span></label>
            <select id="province" required>
              <option value="">请选择</option>
            </select>
          </div>
          <div class="form-group">
            <label>考试年份 <span class="required">*</span></label>
            <select id="year" required>
              <option value="">请选择</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>验证码 <span class="required">*</span></label>
          <div class="captcha-row">
            <input type="text" id="captchaInput" placeholder="请输入验证码" maxlength="4" required autocomplete="off">
            <div class="captcha-box" id="captchaBox" title="点击刷新验证码"></div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span class="spinner" id="spinner"></span>查 询 分 数
        </button>
      </form>
    </div>

    <p class="disclaimer">
      ※ 本页面为模拟演示系统，查询结果仅供参考<br>
      实际分数请以各省教育考试院官方公布为准
    </p>
  </div>

  <!-- ==================== 结果页 ==================== -->
  <div class="result-page" id="resultPage">
    <div class="result-header-card" id="resultHeader"></div>
    <div class="subjects-grid" id="subjectsGrid"></div>
    <div class="info-card" id="infoCard"></div>
    <button class="btn-back" id="btnBack">← 返回重新查询</button>
    <p class="disclaimer">
      ※ 本页面为模拟演示系统，查询结果仅供参考<br>
      实际分数请以各省教育考试院官方公布为准
    </p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  // ============ 省份数据 ============
  const provinces = [
    '北京','天津','河北','山西','内蒙古',
    '辽宁','吉林','黑龙江',
    '上海','江苏','浙江','安徽','福建','江西','山东',
    '河南','湖北','湖南','广东','广西','海南',
    '重庆','四川','贵州','云南','西藏',
    '陕西','甘肃','青海','宁夏','新疆'
  ];

  function getSubjects(province) {
    return [
      { name: '语文', full: 150 },
      { name: '数学', full: 150 },
      { name: '外语', full: 150 },
      { name: '综合', full: 300 }
    ];
  }

  // ============ 初始化 ============
  const provinceSelect = document.getElementById('province');
  provinces.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    provinceSelect.appendChild(opt);
  });

  const yearSelect = document.getElementById('year');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= currentYear - 5; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年';
    yearSelect.appendChild(opt);
  }

  // ============ 验证码 ============
  function generateCaptcha() {
    const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
    let code = '';
    for (let i = 0; i < 4; i++) {
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
  }

  let currentCaptcha = generateCaptcha();
  const captchaBox = document.getElementById('captchaBox');
  captchaBox.textContent = currentCaptcha;
  captchaBox.addEventListener('click', () => {
    currentCaptcha = generateCaptcha();
    captchaBox.textContent = currentCaptcha;
    captchaBox.style.transform = 'scale(0.92)';
    setTimeout(() => { captchaBox.style.transform = 'scale(1)'; }, 150);
  });

  // ============ Toast ============
  function showToast(msg, duration = 2500) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
  }

  // ============ 生成模拟分数 ============
  function generateScore(province) {
    const subjects = getSubjects(province);
    const details = [];
    let total = 0;

    subjects.forEach(sub => {
      let min, max;
      if (sub.name === '语文')     { min = 85; max = sub.full - 8; }
      else if (sub.name === '数学') { min = 55; max = sub.full; }
      else if (sub.name === '外语') { min = 65; max = sub.full - 5; }
      else                          { min = 130; max = sub.full - 8; }

      let score = Math.floor(Math.random() * (max - min + 1)) + min;
      if (Math.random() < 0.06) score = Math.floor(Math.random() * 18) + (sub.full - 17);
      score = Math.min(score, sub.full);
      details.push({ name: sub.name, score, full: sub.full });
      total += score;
    });

    return { total, details };
  }

  // ============ 页面切换 ============
  const queryPage = document.getElementById('queryPage');
  const resultPage = document.getElementById('resultPage');

  function showResultPage() {
    queryPage.classList.add('hidden');
    resultPage.classList.add('show');
    resultPage.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showQueryPage() {
    resultPage.classList.remove('show');
    queryPage.classList.remove('hidden');
    queryPage.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ============ 表单提交 ============
  const form = document.getElementById('queryForm');
  const submitBtn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    // 验证码校验
    const captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();
    if (captchaInput !== currentCaptcha) {
      showToast('❌ 验证码错误，请重新输入');
      currentCaptcha = generateCaptcha();
      captchaBox.textContent = currentCaptcha;
      document.getElementById('captchaInput').value = '';
      return;
    }

    // 模拟查询
    submitBtn.disabled = true;
    spinner.style.display = 'inline-block';
    submitBtn.childNodes[1].textContent = '查询中...';

    setTimeout(() => {
      spinner.style.display = 'none';
      submitBtn.childNodes[1].textContent = '查 询 分 数';
      submitBtn.disabled = false;

      const name = document.getElementById('name').value.trim();
      const province = document.getElementById('province').value;
      const year = document.getElementById('year').value;
      const { total, details } = generateScore(province);

      // 判断批次
      let batch, batchColor;
      if (total >= 600)      { batch = '本科一批 / 特殊类型招生'; batchColor = '#ffd700'; }
      else if (total >= 500) { batch = '本科二批'; batchColor = '#ffd700'; }
      else if (total >= 400) { batch = '本科批'; batchColor = '#c8e6c9'; }
      else                   { batch = '高职高专批'; batchColor = '#ccc'; }

      // 排名
      const rank = Math.floor(Math.random() * 50000) + 1;

      // ====== 渲染结果页 ======
      // 头部总分（点击跳转 DeepSeek）
      document.getElementById('resultHeader').innerHTML = `
        <div class="student-name">${escapeHtml(name)} 同学</div>
        <a class="total-score-link" href="1.html" target="_blank" title="点击用 DeepSeek 查看分数详情">
          🔍 点击查看总分
        </a>
        <div class="meta">${year}年 · ${escapeHtml(province)} · ${batch}</div>
      `;

      // 各科分数卡片（点击跳转 DeepSeek）
      let cardsHtml = '';
      details.forEach((d, i) => {
        let color;
        switch(d.name) {
          case '语文': color = '#e65100'; break;
          case '数学': color = '#1565c0'; break;
          case '外语': color = '#2e7d32'; break;
          case '综合': color = '#6a1b9a'; break;
          default: color = '#333';
        }
        cardsHtml += `
          <a class="subject-card" href="1.html" target="_blank" title="点击用 DeepSeek 查看${d.name}分数详情" style="text-decoration:none;color:inherit;display:block;">
            <div class="sub-name">${d.name}</div>
            <div class="sub-score-hidden"><span class="click-hint-sm">点击查看</span></div>
            <div class="sub-full">满分 ${d.full} 分</div>
          </a>`;
      });
      document.getElementById('subjectsGrid').innerHTML = cardsHtml;

      // 详细信息
      document.getElementById('infoCard').innerHTML = `
        <div class="info-row">
          <span class="label">考生姓名</span>
          <span class="value">${escapeHtml(name)}</span>
        </div>
        <div class="info-row">
          <span class="label">省份 / 直辖市</span>
          <span class="value">${escapeHtml(province)}</span>
        </div>
        <div class="info-row">
          <span class="label">考试年份</span>
          <span class="value">${escapeHtml(year)}年</span>
        </div>
        <div class="info-row">
          <span class="label">全省排名</span>
          <span class="value" style="color:var(--primary);">第 ${rank.toLocaleString()} 名</span>
        </div>
        <div class="info-row">
          <span class="label">预估批次</span>
          <span class="value">${batch}</span>
        </div>
      `;

      // 跳转到结果页
      showResultPage();

      // 重置验证码
      currentCaptcha = generateCaptcha();
      captchaBox.textContent = currentCaptcha;
      document.getElementById('captchaInput').value = '';
    }, 900 + Math.random() * 800);
  });

  // ============ 返回按钮 ============
  document.getElementById('btnBack').addEventListener('click', () => {
    showQueryPage();
  });

  // ============ 工具函数 ============
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>

</body>
</html>
