<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渐渐显示</title>
    <style>
        /* 整个页面渐渐显示 */
        body {
            animation: fadeIn 2s ease forwards;
            opacity: 0;
            background: #0b0d10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem;
            margin: 0;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .box {
            max-width: 820px;
            width: 100%;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .bg {
            background-image: url('1.jpg');
            background-size: cover;
            background-position: center;
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* 半透明遮罩 */
        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        /* 文字渐渐显示（比背景慢一点） */
        .text {
            position: relative;
            z-index: 1;
            color: #f5ede4;
            text-align: center;
            font-size: clamp(1rem, 4vw, 1.8rem);
            line-height: 1.8;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            animation: textFade 2.5s ease 0.5s forwards;
            opacity: 0;
        }

        @keyframes textFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 高亮关键词 */
        .gold {
            color: #f7cfa0;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .bg { min-height: 380px; }
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="bg">
            <div class="text">
                <span class="gold">少</span>字开头，<span class="gold">羽</span>字结尾，一个他，撑起了我
                的整个青春，他，是我一辈子的信仰🌹<br>
                <span class="gold">少羽</span>这两个字看起，来太独特，你若折他
                一根翅膀👊我必毁你整个天堂👎<br>
                风雨难改我初心，只为记住羽家名，<span class="gold">羽家</span> 永存！<br>
                用最初的心陪<span class="gold">少羽</span>走最远的路 OK
            </div>
        </div>
    </div>

</body>
</html>
